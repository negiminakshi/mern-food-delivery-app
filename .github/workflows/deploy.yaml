name: MERN App ECS Deployment

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ap-south-1

      - name: Login to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      # FRONTEND
      - name: Build Frontend Image
        run: |
          docker build -t frontend-app ./frontend
          docker tag frontend-app:latest 837564895422.dkr.ecr.ap-south-1.amazonaws.com/frontend-app:latest

      - name: Push Frontend Image
        run: |
          docker push 837564895422.dkr.ecr.ap-south-1.amazonaws.com/frontend-app:latest

      # BACKEND
      - name: Build Backend Image
        run: |
          docker build -t backend-node ./backend
          docker tag backend-node:latest 837564895422.dkr.ecr.ap-south-1.amazonaws.com/backend-node:latest

      - name: Push Backend Image
        run: |
          docker push 837564895422.dkr.ecr.ap-south-1.amazonaws.com/backend-node:latest

      # FORCE NEW ECS DEPLOYMENT
      - name: Deploy to ECS
        run: |
          aws ecs update-service \
            --cluster <cluster-name> \
            --service <cluster-service> \
            --force-new-deployment
