name: MERN App Deployment

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ap-south-1

      - name: Login to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build Frontend Image
        run: |
          docker build -t frontend-app ./frontend
          docker tag frontend-app:latest 837564895422.dkr.ecr.ap-south-1.amazonaws.com/frontend-app:latest

      - name: Push Frontend Image
        run: |
          docker push 837564895422.dkr.ecr.ap-south-1.amazonaws.com/frontend-app:latest

      - name: Build Backend Image
        run: |
          docker build -t backend-node ./backend
          docker tag backend-node:latest 837564895422.dkr.ecr.ap-south-1.amazonaws.com/backend-node:latest

      - name: Push Backend Image
        run: |
          docker push 837564895422.dkr.ecr.ap-south-1.amazonaws.com/backend-node:latest

      - name: Deploy on EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            cd ~/mern-food-delivery-app

            aws ecr get-login-password --region ap-south-1 | docker login --username AWS --password-stdin 837564895422.dkr.ecr.ap-south-1.amazonaws.com

            docker compose pull
            docker compose down
            docker compose up -d
